<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Oracle | Torn City Betting</title>
    <style>
        /* إعدادات الخلفية والصفحة بالكامل */
        body {
            background-color: #0a0505; /* أسود داكن مايل للأحمر */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* اللوجو أو الصورة اللي في النص */
        .oracle-logo {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px #ff0033); /* توهج أحمر */
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* اسم الموقع بالخط الأحمر الفاقع */
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #ff0033; /* أحمر فاقع */
            text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* الوصف تحت العنوان */
        .description {
            color: #8a8a8a;
            font-size: 1rem;
            max-width: 350px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* الخانة بتاعة الـ API Key */
        .api-input {
            width: 100%;
            max-width: 320px;
            background-color: #1a0d0e;
            border: 2px solid #ff0033;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.2);
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .api-input:focus {
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.6);
            background-color: #261012;
        }

        .api-input::placeholder {
            color: #523033;
            letter-spacing: 1px;
        }

        /* لينك المساعدة الصغير */
        .help-link {
            color: #ff0033;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 25px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .help-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* الزرار الرئيسي الكبير */
        .submit-btn {
            width: 100%;
            max-width: 320px;
            background-color: #ff0033;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 51, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background-color: #cc0029;
            box-shadow: 0 4px 25px rgba(255, 0, 51, 0.7);
            transform: translateY(-2px);
        }

        /* الملحوظة اللي تحت خالص */
        .footer-note {
            color: #444;
            font-size: 0.8rem;
            margin-top: 40px;
        }
        .footer-note strong {
            color: #ff0033;
        }
    </style>
</head>
<body>

    <div class="oracle-logo">🔮</div>

    <h1>Crimson Oracle</h1>
    
    <p class="description">
        Bet your Xanax and consult the Crimson Oracle. It may double your stash... or burn it to ashes.
    </p>

    <input type="text" class="api-input" placeholder="Your PUBLIC API key" maxlength="16">
    
    <a href="https://www.torn.com/preferences.php#tab=api" target="_blank" class="help-link">Get your API key here →</a>

    <button class="submit-btn" onclick="startOracle()">Consult the Oracle</button>

    <p class="footer-note">Only a <strong>public</strong> API key is needed.</p>

    <script>
        function startOracle() {
            alert("The Oracle is waiting for the backend linkage...");
        }
    </script>

</body>
</html>
