<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino | Torn City</title>
    <style>
        /* إعدادات الخلفية: استخدام رابط الصورة المباشر لضمان ظهورها فوراً */
        body {
            background-color: #050000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://raw.githubusercontent.com/noorelldin/Crimson-Oracle/main/file_00000000_d45899.png');
            /* ملحوظة: لو جيت هاب مظهرش الصورة، الكود تحت مستخدم نسخة احتياطية سريعة عشان تشوف التصميم فوراً */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('https://i.ibb.co/vxsYg3C/1000151008.png'); 
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* رصيد اللاعب العلوي المتوهج */
        .balance-card {
            background: rgba(255, 0, 51, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #ff0033;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.4);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .balance-card span {
            color: #4caf50;
            text-shadow: 0 0 10px #4caf50;
        }

        /* الحاوية الزجاجية الشفافة الفخمة لتبان الخلفية من ورائها */
        .casino-container {
            background: rgba(10, 3, 4, 0.75); /* تقليل التعتيم لتظهر ملامح الملك وراء المينيو */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 0, 51, 0.4);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 0, 51, 0.15);
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            color: #ff0033;
            text-shadow: 0 0 10px #ff0033, 0 0 25px #ff0033;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #b3b3b3;
            font-size: 0.95rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* تأثيرات الشاشات */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        /* أزرار القائمة الرئيسية المحسنة جداً بمؤثرات النيون */
        .menu-btn {
            width: 100%;
            background: rgba(30, 10, 12, 0.6);
            color: white;
            border: 1.5px solid rgba(255, 0, 51, 0.6);
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .menu-btn:hover {
            background: rgba(255, 0, 51, 0.8);
            border-color: #ff0033;
            box-shadow: 0 0 20px #ff0033;
            transform: translateY(-3px);
        }
        .menu-btn span {
            font-size: 1.4rem;
            transition: 0.3s;
        }
        .menu-btn:hover span {
            transform: translateX(5px);
        }

        /* أزرار اللعب وحقول الإدخال */
        input[type="number"] {
            width: 85%;
            background: #0a0203;
            border: 1.5px solid #ff0033;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 15px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .action-btn {
            width: 85%;
            background: #ff0033;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 0, 51, 0.4);
            margin: 8px 0;
        }
        .action-btn:hover {
            background: #cc0029;
            box-shadow: 0 6px 20px rgba(255, 0, 51, 0.7);
            transform: translateY(-1px);
        }

        /* زرار الرجوع الفخم أسفل شاشات الألعاب */
        .back-btn {
            background: rgba(255, 0, 51, 0.1);
            border: 1px solid rgba(255, 0, 51, 0.5);
            color: #ff0033;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 25px;
            display: inline-block;
            font-size: 0.85rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-btn:hover {
            background: #ff0033;
            color: white;
            box-shadow: 0 0 15px #ff0033;
        }

        /* ستايلات الجيمز */
        .bj-zone {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .cards { font-size: 1.3rem; color: #ff0033; font-weight: bold; margin-top: 5px; text-shadow: 0 0 5px rgba(255,0,51,0.5); }
        .lottery-info { font-size: 0.95rem; color: #ccc; line-height: 1.5; margin-bottom: 20px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="balance-card" id="balance-card">
        Your Balance: <span id="balance-display">50</span> Xanax
    </div>

    <div class="casino-container">
        <h1>Crimson Casino</h1>
        <div class="subtitle" id="casino-subtitle">The Oracle Awaits Your Fate</div>

        <div id="main-menu" class="screen active">
            <button class="menu-btn" onclick="goToScreen('oracle')">
                🔮 Crimson Oracle <span>→
