<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino</title>
    <style>
        :root {
            --bg-nav: rgba(15, 2, 2, 0.85);
            --primary: #8b0000;
            --primary-hover: #ff1a1a;
            --text-main: #fcebeb;
            --text-muted: #cca3a3;
            --green: #10b981;
            --glow-green: rgba(16, 185, 129, 0.4);
            --glow-red: rgba(239, 68, 68, 0.4);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #5c0000 0%, #1a0404 50%, #050000 100%);
            background-size: 400% 400%; animation: nebulaMove 12s ease infinite;
            color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif;
        }

        @keyframes nebulaMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, transparent 1px);
            background-size: 60px 60px; opacity: 0.1; pointer-events: none;
            animation: starsTwinkle 4s infinite alternate; z-index: 0;
        }

        @keyframes starsTwinkle { from { opacity: 0.03; } to { opacity: 0.2; } }

        .top-navbar {
            background: var(--bg-nav); border-bottom: 2px solid var(--primary); padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center; position: sticky;
            top: 0; z-index: 100; backdrop-filter: blur(10px);
        }

        .brand-logo { font-weight: 900; font-size: 1.4rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
        .wallet-zone { display: flex; align-items: center; gap: 12px; }
        .wallet-balance { font-weight: 700; font-size: 0.9rem; }
        .wallet-balance span { color: var(--green); text-shadow: 0 0 8px var(--glow-green); }

        .deposit-btn { background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 800; font-size: 0.8rem; cursor: pointer; transition: all 0.2s ease; }
        .deposit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 26, 26, 0.6); }

        .main-content { flex: 1; max-width: 480px; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; padding-bottom: 90px; z-index: 1; }

        .hero-banner h2 { margin: 0 0 4px 0; font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
        .hero-banner p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }

        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 25px; }

        .game-card {
            background: rgba(40, 8, 8, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            overflow: hidden; cursor: pointer; display: flex; flex-direction: column; aspect-ratio: 1 / 1.1;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); backdrop-filter: blur(5px); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .game-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary-hover); box-shadow: 0 12px 30px rgba(139, 0, 0, 0.6); background: rgba(69, 16, 16, 0.6); }

        .card-img-area { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; }
        .game-footer-info { padding: 12px; background: rgba(15, 2, 2, 0.8); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .game-title { margin: 0; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        .game-play-panel { background: rgba(40, 8, 8, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px 20px; text-align: center; backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        input[type="number"] { width: 80%; background: #0f0202; border: 1px solid #5a1818; border-radius: 8px; padding: 12px; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 15px; outline: none; }
        .action-btn { width: 85%; background: var(--primary); color: white; border: none; padding: 14px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 0 10px var(--primary); }
        .action-btn:hover { background: var(--primary-hover); box-shadow: 0 0 20px var(--primary-hover); }
        .back-nav-container { margin-bottom: 12px; text-align: left; }
        .back-nav-btn { background: rgba(40, 8, 8, 0.8); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        .result-popup-banner { margin-top: 15px; font-size: 1.2rem; font-weight: 900; padding: 10px; border-radius: 8px; text-transform: uppercase; display: none; }
        .win { background: rgba(16, 185, 129, 0.2); color: var(--green); border: 1px solid var(--green); box-shadow: 0 0 15px var(--glow-green); }
        .lose { background: rgba(239, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; box-shadow: 0 0 15px var(--glow-red); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-nav); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="brand-logo">Crimson Casino</div>
        <div class="wallet-zone">
            <div class="wallet-balance"><span id="balance-display">500</span> Xanax</div>
            <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
        </div>
    </div>

    <div class="main-content">
        <div id="main-menu" class="screen active">
            <div class="hero-banner"><h2>GAMES</h2><p>Deep Space Gaming</p></div>
            <div class="games-grid">
                <div class="game-card" onclick="openGame('oracle')"><div class="card-img-area">🔮</div><div class="game-footer-info"><h4 class="game-title">Oracle</h4></div></div>
                <div class="game-card" onclick="openGame('blackjack')"><div class="card-img-area">🃏</div><div class="game-footer-info"><h4 class="game-title">Blackjack</h4></div></div>
                <div class="game-card" onclick="openGame('chicken')"><div class="card-img-area">🐔</div><div class="game-footer-info"><h4 class="game-title">Chicken</h4></div></div>
                <div class="game-card" onclick="openGame('mines')"><div class="card-img-area">💣</div><div class="game-footer-info"><h4 class="game-title">Mines</h4></div></div>
            </div>
        </div>

        <div id="screen-oracle" class="screen">...</div> <div id="screen-blackjack" class="screen">...</div> <div id="screen-chicken" class="screen">
            <div class="back-nav-container"><button class="back-nav-btn" onclick="backToMenu()">← Back</button></div>
            <div class="game-play-panel"><h3>CHICKEN CROSS</h3><input type="number" id="chicken-bet" value="5"><button class="action-btn" onclick="playChicken()">Start</button><div id="chicken-result-banner" class="result-popup-banner"></div></div>
        </div>
        <div id="screen-mines" class="screen">
            <div class="back-nav-container"><button class="back-nav-btn" onclick="backToMenu()">← Back</button></div>
            <div class="game-play-panel"><h3>MINES</h3><input type="number" id="mines-bet" value="5"><button class="action-btn" onclick="playMines()">Reveal</button><div id="mines-result-banner" class="result-popup-banner"></div></div>
        </div>
    </div>

    <script>
        // دمج الدوال الجديدة مع الدوال الأصلية
        function playChicken() { /* نفس المنطق الذي ناقشناه */ }
        function playMines() { /* نفس المنطق */ }
        // تأكد من إضافة سطر `document.getElementById('screen-chicken').style.display = 'none';` داخل دالة backToMenu الأصلية
    </script>
</body>
</html>
