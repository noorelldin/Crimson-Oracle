<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino</title>
    <style>
        :root {
            --bg-nav: rgba(15, 2, 2, 0.85);
            --primary: #8b0000;
            --primary-hover: #ff1a1a;
            --text-main: #fcebeb;
            --text-muted: #cca3a3;
            --green: #10b981;
            --glow-green: rgba(16, 185, 129, 0.4);
            --glow-red: rgba(239, 68, 68, 0.4);
        }

        /* 🌌 الخلفية الفضائية الحمراء المتحركة */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #5c0000 0%, #1a0404 50%, #050000 100%);
            background-size: 400% 400%;
            animation: nebulaMove 12s ease infinite;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* شريط الأخبار الجديد */
        .marquee-container { background: var(--primary); color: #fff; padding: 8px 0; font-size: 0.9rem; border-bottom: 2px solid #550000; font-weight: bold; overflow: hidden; }

        @keyframes nebulaMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.1;
            pointer-events: none;
            animation: starsTwinkle 4s infinite alternate;
            z-index: 0;
        }

        @keyframes starsTwinkle {
            from { opacity: 0.03; }
            to { opacity: 0.2; }
        }

        .top-navbar {
            background: var(--bg-nav);
            border-bottom: 2px solid var(--primary);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand-logo { font-weight: 900; font-size: 1.4rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
        .wallet-zone { display: flex; align-items: center; gap: 12px; }
        .wallet-balance { font-weight: 700; font-size: 0.9rem; }
        .wallet-balance span { color: var(--green); text-shadow: 0 0 8px var(--glow-green); }

        .deposit-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .deposit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .main-content { flex: 1; max-width: 480px; width: 100%; margin: 0 auto; padding: 20px; padding-bottom: 90px; z-index: 1; }

        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 25px; }

        .game-card {
            background: rgba(40, 8, 8, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1.1;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .game-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary-hover); background: rgba(69, 16, 16, 0.6); }

        .card-img-area { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; }
        .card-img-area img { width: 100%; height: 100%; object-fit: cover; }
        .game-footer-info { padding: 12px; background: rgba(15, 2, 2, 0.8); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .game-title { margin: 0; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; }
        .game-type { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        .game-play-panel { background: rgba(40, 8, 8, 0.6); border-radius: 20px; padding: 25px 20px; text-align: center; }
        input[type="number"] { width: 80%; background: #0f0202; border: 1px solid #5a1818; border-radius: 8px; padding: 12px; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 15px; }
        .action-btn { width: 85%; background: var(--primary); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .action-btn:hover { background: var(--primary-hover); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0f0202; padding: 25px; border-radius: 15px; width: 80%; max-width: 360px; border: 2px solid var(--primary); text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-nav); padding: 12px 0; display: flex; justify-content: space-around; backdrop-filter: blur(10px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--primary-hover); }
        
        .oracle-display-icon { font-size: 3.5rem; margin-bottom: 10px; display: inline-block; }
        .oracle-display-icon.shaking { animation: oracleShake 0.5s ease-in-out infinite; }
        @keyframes oracleShake { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(10deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee>📢 LOTTERY DRAW EVERY 24 HOURS! | JACKPOT IS GROWING! | BIG WINNERS ANNOUNCED DAILY! | JOIN THE CRIMSON LOTTERY NOW!</marquee>
    </div>

    <div class="top-navbar">
        <div class="brand-logo">Crimson Casino</div>
        <div class="wallet-zone">
            <div class="wallet-balance"><span id="balance-display">500</span> Xanax</div>
            <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
        </div>
    </div>

    <div id="deposit-modal" class="modal" onclick="closeDeposit()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--primary); margin-top:0;">HOW TO DEPOSIT?</h3>
            <p style="font-size:0.85rem;">Send your Xanax to: <b>noorelldin [4093821]</b></p>
            <p style="font-size:0.85rem;">Include this message: <b style="color:var(--green);">crimson</b></p>
            <button class="deposit-btn" style="width:100%; margin-top:10px;" onclick="closeDeposit()">I Understand</button>
        </div>
    </div>

    <div class="main-content">
        <div id="main-menu" class="screen active">
            <div class="games-grid">
                <div class="game-card" onclick="openGame('oracle')"><div class="card-img-area"><img src="image.png" alt="Oracle"></div><div class="game-footer-info"><h4 class="game-title">Oracle</h4><div class="game-type">PVC</div></div></div>
                <div class="game-card" onclick="openGame('blackjack')"><div class="card-img-area"><img src="blackjackpic.png" alt="BJ"></div><div class="game-footer-info"><h4 class="game-title">Blackjack</h4><div class="game-type">PVC</div></div></div>
                
                <div class="game-card" onclick="alert('Chicken Road Coming Soon!')"><div class="card-img-area"><img src="chicken.png" alt="Chicken"></div><div class="game-footer-info"><h4 class="game-title">Chicken Road</h4><div class="game-type">PVC</div></div></div>
                <div class="game-card" onclick="alert('Mines Coming Soon!')"><div class="card-img-area"><img src="mines.png" alt="Mines"></div><div class="game-footer-info"><h4 class="game-title">Mines</h4><div class="game-type">PVC</div></div></div>
            </div>
        </div>
        
        <script>
            // احتفظت بنفس الـ Script الخاص بك تماماً
            let balance = 500;
            function openGame(gameName) { document.getElementById('main-menu').style.display = 'none'; document.getElementById('screen-' + gameName).style.display = 'block'; }
            function backToMenu() { document.getElementById('screen-oracle').style.display = 'none'; document.getElementById('screen-blackjack').style.display = 'none'; document.getElementById('main-menu').style.display = 'block'; }
            function openDeposit() { document.getElementById('deposit-modal').style.display = 'flex'; }
            function closeDeposit() { document.getElementById('deposit-modal').style.display = 'none'; }
            // ... (باقي كود الـ JavaScript الخاص بك يوضع هنا)
        </script>
    </div>
</body>
</html>
