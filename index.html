<!-- حدثت جزء الـ Modal في الكود عشان يظهر بياناتك بوضوح -->
<div id="deposit-modal" class="modal" onclick="closeDeposit()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--primary); margin-top:0;">DEPOSIT XANAX</h3>
        <p style="font-size:0.85rem; color: var(--text-main)">Send your Xanax to:</p>
        
        <!-- هنا الـ ID بتاعك -->
        <div style="background:#000; padding:10px; border-radius:6px; margin: 10px 0; border: 1px solid var(--primary);">
            <div style="color:var(--text-muted); font-size: 0.7rem;">ACCOUNT ID</div>
            <div style="font-weight:bold; font-size:1.1rem; color:#fff;">noorelldin [4093821]</div>
        </div>

        <p style="font-size:0.85rem; color: var(--text-main)">Include this message <b>exactly</b>:</p>
        
        <!-- هنا الرسالة -->
        <div style="background:#000; padding:12px; font-size:1.2rem; font-weight:bold; color:var(--green); border-radius:6px; margin: 10px 0; letter-spacing:1px; border: 1px dashed var(--green);">
            crimson
        </div>
        
        <p style="font-size:0.75rem; color:var(--text-muted)">Our API will automatically detect the message and credit your account.</p>
        <button class="deposit-btn" style="width:100%; margin-top:10px;" onclick="closeDeposit()">I Understand</button>
    </div>
</div>
