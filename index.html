<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Crimson Casino | Official</title>
    <style>
        /* الأساسيات والخلفية المتحركة */
        body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 50% 50%, #4a0000 0%, #1a0404 40%, #050000 100%); background-size: 200% 200%; animation: interstellar 20s ease infinite; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        @keyframes interstellar { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* الـ Navigation Bar */
        .top-nav { width: 100%; padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid #8b0000; }
        .wallet { color: #10b981; font-weight: bold; font-size: 1.1rem; }
        .deposit-btn { background: #8b0000; border: none; color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* منطقة الألعاب */
        .casino-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; width: 90%; max-width: 1000px; }
        .game-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s; }
        .game-card:hover { transform: translateY(-10px); border-color: #8b0000; }
        .btn { background: #8b0000; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }

        /* نافذة الإيداع */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a0404; padding: 40px; border-radius: 20px; border: 1px solid #8b0000; text-align: center; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div style="font-size: 1.5rem; font-weight: bold; color: #8b0000;">CRIMSON CASINO</div>
        <div class="wallet">Balance: <span id="user-bal">50</span> Xanax</div>
        <button class="deposit-btn" onclick="document.getElementById('modal').style.display='flex'">Deposit</button>
    </nav>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>DEPOSIT</h2>
            <p>Send to: <b>noorelldin [4093821]</b></p>
            <p>Message: <b>crimson</b></p>
            <button class="btn" onclick="document.getElementById('modal').style.display='none'">Close</button>
        </div>
    </div>

    <div class="casino-grid">
        <!-- لعبة الـ Oracle -->
        <div class="game-card">
            <div style="font-size: 4rem;">🔮</div>
            <h3>CRIMSON ORACLE</h3>
            <p>PVC Mode | Provably Fair</p>
            <button class="btn" onclick="playGame('oracle')">Play Now</button>
            <div id="oracle-res" style="margin-top: 15px; font-weight: bold;"></div>
        </div>

        <!-- لعبة الـ Blackjack -->
        <div class="game-card">
            <div style="font-size: 4rem;">🃏</div>
            <h3>BLACKJACK</h3>
            <p>PVC Mode | Dealer Logic</p>
            <button class="btn" onclick="playGame('blackjack')">Play Now</button>
        </div>
    </div>

    <script>
        let balance = 50;
        function playGame(game) {
            if(game === 'oracle') {
                let res = document.getElementById('oracle-res');
                res.innerText = "Consulting...";
                setTimeout(() => {
                    // نسبة الفوز للـ House هي 60%
                    let win = Math.random() < 0.40;
                    if(win) {
                        balance += 10;
                        res.innerText = "YOU WIN!"; res.style.color = "#10b981";
                    } else {
                        balance -= 10;
                        res.innerText = "HOUSE WINS!"; res.style.color = "#ff4444";
                    }
                    document.getElementById('user-bal').innerText = balance;
                }, 1000);
            }
        }
    </script>
</body>
</html>
