<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #4a0000 0%, #1a0404 40%, #050000 100%);
            background-size: 200% 200%;
            animation: interstellar 20s ease infinite;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes interstellar {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { margin-top: 30px; font-size: 2rem; font-weight: bold; text-shadow: 0 0 20px #8b0000; }

        .container { display: flex; gap: 20px; margin-top: 50px; }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            width: 250px;
        }

        .action-btn {
            background: #8b0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            width: 100%;
        }

        .shake-animation { animation: shake 0.8s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
        }
    </style>
</head>
<body>

    <div class="header">CRIMSON CASINO</div>

    <div class="container">
        <!-- Oracle Panel -->
        <div class="panel">
            <div id="crystal-ball" style="font-size: 4rem; cursor: pointer;">🔮</div>
            <h3>CRIMSON ORACLE</h3>
            <p style="color: #aaa; font-size: 0.7rem;">PVC MODE</p>
            <button class="action-btn" onclick="playOracle()">Shake The Oracle</button>
            <div id="oracle-result" style="margin-top: 15px; font-weight: bold; min-height: 20px;"></div>
        </div>

        <!-- Blackjack Panel -->
        <div class="panel">
            <div style="font-size: 4rem;">🃏</div>
            <h3>BLACKJACK</h3>
            <p style="color: #aaa; font-size: 0.7rem;">PVC MODE</p>
            <button class="action-btn" onclick="alert('Starting Blackjack...')">Play Now</button>
        </div>
    </div>

    <script>
        function playOracle() {
            let ball = document.getElementById('crystal-ball');
            let resultDiv = document.getElementById('oracle-result');
            
            ball.classList.add('shake-animation');
            resultDiv.innerText = "Processing...";
            
            setTimeout(() => {
                ball.classList.remove('shake-animation');
                // نسبة 40% للاعب (مكسب الـ House هو الـ 60%)
                let playerWins = Math.random() < 0.40; 
                
                if (playerWins) {
                    resultDiv.innerText = "YOU WIN!";
                    resultDiv.style.color = "#10b981";
                } else {
                    resultDiv.innerText = "HOUSE WINS!";
                    resultDiv.style.color = "#ff4444";
                }
            }, 1000);
        }
    </script>
</body>
</html>
