<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Space | House Management</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --primary: #8b0000;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #4a0000 0%, #1a0404 40%, #050000 100%);
            background-size: 200% 200%;
            animation: interstellar 20s ease infinite;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        @keyframes interstellar {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* المربعات (Glassmorphism) */
        .panel {
            background: var(--glass) !important;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            width: 300px;
        }

        /* أنيميشن الهزة للبلورة */
        .shake-animation { animation: shake 0.8s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="panel" style="margin-top: 100px;">
        <div id="crystal-ball" style="font-size: 5rem; cursor: pointer;">🔮</div>
        <h2 style="margin: 10px 0;">CRIMSON ORACLE</h2>
        <p style="color: #ccc; font-size: 0.9rem;">House Edge Active (60/40)</p>
        <button class="action-btn" onclick="playOracle()">Shake The Oracle</button>
        <div id="result" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; min-height: 30px;"></div>
    </div>

    <script>
        function playOracle() {
            let ball = document.getElementById('crystal-ball');
            let resultDiv = document.getElementById('result');
            
            ball.classList.add('shake-animation');
            resultDiv.innerText = "Consulting the stars...";
            
            setTimeout(() => {
                ball.classList.remove('shake-animation');
                
                // هنا النسبة اللي تضمن ربحك كـ House (60% للـ House)
                let playerWins = Math.random() < 0.40; 
                
                if (playerWins) {
                    resultDiv.innerText = "YOU WON!";
                    resultDiv.style.color = "#10b981";
                } else {
                    resultDiv.innerText = "HOUSE WINS!";
                    resultDiv.style.color = "#ff4444";
                }
            }, 1000);
        }
    </script>
</body>
</html>
