<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Oracle | Torn City Betting</title>
    <style>
        /* إعدادات الخلفية وضبط الصورة بالطول */
        body {
            background-image: url('file_00000000.png'); /* اسم الصورة اللي رفعناها */
            background-size: cover; /* تجعل الصورة تغطي الشاشة بالكامل */
            background-position: center top; /* تظبط نص الصورة في الشاشة من فوق عشان ملامح الملك تبان */
            background-repeat: no-repeat;
            background-attachment: fixed; /* تثبيت الخلفية أثناء التمرير */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* سحب المحتوى لأسفل الشاشة عشان يسيب مساحة للصورة فوق */
            min-height: 100vh;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        /* حاوية زجاجية مظلمة عشان الكلام يقرأ بوضوح فوق الصورة الصاخبة */
        .main-container {
            background: rgba(10, 5, 5, 0.75); /* أسود شفاف */
            backdrop-filter: blur(8px); /* تأثير ضبابي زجاجي راقي */
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 0, 51, 0.3); /* إطار أحمر خفيف */
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 0, 51, 0.1);
        }

        /* اسم الموقع بالخط الأحمر الفاقع النيون */
        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: #ff0033;
            text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* الوصف */
        .description {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 25px 0;
        }

        /* خانة إدخال الـ API */
        .api-input {
            width: 100%;
            background-color: rgba(26, 13, 14, 0.8);
            border: 2px solid #ff0033;
            border-radius: 8px;
            padding: 14px;
            color: #ffffff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.1);
            transition: 0.3s;
            margin-bottom: 8px;
        }

        .api-input:focus {
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.5);
            background-color: #261012;
        }

        .api-input::placeholder {
            color: #6b3e42;
        }

        /* لينك المساعدة */
        .help-link {
            color: #ff0033;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 25px;
            opacity: 0.9;
            transition: 0.3s;
        }

        .help-link:hover {
            text-shadow: 0 0 8px #ff0033;
        }

        /* الزرار الرئيسي الكبير الفاقع */
        .submit-btn {
            width: 100%;
            background-color: #ff0033;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 51, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        .submit-btn:hover {
            background-color: #cc0029;
            box-shadow: 0 4px 25px rgba(255, 0, 51, 0.7);
            transform: translateY(-2px);
        }

        .footer-note {
            color: #777;
            font-size: 0.75rem;
            margin: 20px 0 0 0;
        }
        .footer-note strong {
            color: #ff0033;
        }
    </style>
</head>
<body>

    <!-- تم وضع العناصر داخل حاوية زجاجية لحمايتها من تفاصيل الخلفية الصاخبة -->
    <div class="main-container">
        <h1>Crimson Oracle</h1>
        
        <p class="description">
            Bet your Xanax and consult the Crimson Oracle. It may double your stash... or burn it to ashes.
        </p>

        <input type="text" class="api-input" placeholder="Your PUBLIC API key" maxlength="16">
        
        <a href="https://www.torn.com/preferences.php#tab=api" target="_blank" class="help-link">Get your API key here →</a>

        <button class="submit-btn" onclick="startOracle()">Consult the Oracle</button>

        <p class="footer-note">Only a <strong>public</strong> API key is needed.</p>
    </div>

    <script>
        function startOracle() {
            alert("The Oracle is examining your luck...");
        }
    </script>

</body>
</html>
