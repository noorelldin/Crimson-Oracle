<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crimson Casino - Adjusted Edge</title>
    <style>
        :root { --primary: #8b0000; --bg: #050000; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .card { background: #1a0404; padding: 20px; border: 1px solid var(--primary); cursor: pointer; border-radius: 10px; }
        @keyframes shake { 0%, 100% {transform: translateX(0)} 25% {transform: translateX(-5px)} 75% {transform: translateX(5px)} }
        .shake { animation: shake 0.2s infinite; }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 250px; margin: 20px auto; }
        .cell { aspect-ratio: 1; background: #330000; transition: 0.3s; cursor: pointer; }
        #road { height: 100px; background: #111; position: relative; overflow: hidden; margin: 20px auto; width: 300px; }
        #chick { position: absolute; left: 0; bottom: 10px; font-size: 30px; transition: 1s; }
        #car { position: absolute; right: -50px; bottom: 10px; font-size: 30px; transition: 0.5s; }
    </style>
</head>
<body>
    <h2>Crimson Casino | Balance: <span id="bal">500</span></h2>
    <div id="menu" class="grid">
        <div class="card" onclick="show('chicken')">🐔 Chicken</div>
        <div class="card" onclick="show('mines')">💣 Mines</div>
        <div class="card" onclick="show('bj')">🃏 Blackjack</div>
        <div class="card" onclick="show('oracle')">🔮 Oracle</div>
    </div>

    <div id="chicken" style="display:none">
        <button onclick="back()">Back</button>
        <div id="road"><div id="chick">🐔</div><div id="car">🚗</div></div>
        <button onclick="playCh()">Cross (60% Edge)</button>
    </div>

    <div id="mines" style="display:none">
        <button onclick="back()">Back</button>
        <div class="mines-grid" id="m-grid"></div>
    </div>

    <div id="bj" style="display:none">
        <button onclick="back()">Back</button>
        <h3>Blackjack</h3>
        <button onclick="alert('Random Logic')">Deal</button>
    </div>

    <div id="oracle" style="display:none">
        <button onclick="back()">Back</button>
        <div id="ball" style="font-size:50px">🔮</div>
        <button onclick="shake()">Shake (60% Edge)</button>
    </div>

    <script>
        let bal = 500;
        
        function updateBal(amount) { bal += amount; document.getElementById('bal').innerText = bal; }

        // Oracle & Chicken: House Edge 60% (يعني اللاعب بيكسب في 40% فقط)
        function shake() {
            let b = document.getElementById('ball');
            b.classList.add('shake');
            setTimeout(() => {
                b.classList.remove('shake');
                updateBal(Math.random() < 0.4 ? 50 : -50);
            }, 1000);
        }

        function playCh() {
            let c = document.getElementById('chick'), car = document.getElementById('car');
            c.style.left = "80%";
            setTimeout(() => {
                if(Math.random() < 0.4) { alert("You crossed!"); updateBal(50); } 
                else { alert("Crash!"); updateBal(-50); }
                c.style.left = "0";
            }, 1000);
        }

        // Mines: Random (50/50)
        let g = document.getElementById('m-grid');
        for(let i=0; i<25; i++) {
            let d = document.createElement('div'); d.className='cell';
            d.onclick = () => { d.style.background = Math.random() > 0.5 ? '#10b981' : '#8b0000'; };
            g.appendChild(d);
        }

        function show(id) { document.getElementById('menu').style.display='none'; document.getElementById(id).style.display='block'; }
        function back() { document.querySelectorAll('[id^=chicken], [id^=mines], [id^=bj], [id^=oracle]').forEach(s=>s.style.display='none'); document.getElementById('menu').style.display='grid'; }
    </script>
</body>
</html>
