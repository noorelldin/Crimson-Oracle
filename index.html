<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Space Casino</title>
    <style>
        :root {
            --bg-nav: rgba(15, 2, 2, 0.85);
            --primary: #8b0000;
            --primary-hover: #ff1a1a;
            --text-main: #fcebeb;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* الخلفية المتحركة - Interstellar Style */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #2a0000 0%, #0a0505 50%, #000000 100%);
            background-size: 300% 300%;
            animation: interstellar 30s ease infinite;
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes interstellar {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* المربعات الخاصة بالألعاب تختلف عن الخلفية */
        .game-play-panel {
            background: rgba(10, 5, 5, 0.8) !important;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* باقي التصميم */
        .top-navbar { background: var(--bg-nav); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); }
        .main-content { max-width: 480px; margin: 0 auto; padding: 20px; }
        .action-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .playing-card { background: white; color: black; padding: 20px; border-radius: 8px; display: inline-block; margin: 5px; animation: dealCard 0.5s ease-out; }
        @keyframes dealCard { from { transform: translate(-100px, -100px) rotate(-45deg); opacity: 0; } to { transform: translate(0, 0) rotate(0deg); opacity: 1; } }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div style="font-weight: 900; font-size: 1.2rem;">CRIMSON CASINO</div>
        <div>Balance: <span id="balance-display">50</span> Xanax</div>
    </div>

    <div class="main-content">
        <div id="screen-oracle" class="game-play-panel">
            <h3>🔮 CRIMSON ORACLE</h3>
            <p style="font-size:0.8rem; color: #aaa;">PVC MODE</p>
            <input type="number" id="oracle-bet" min="1" value="5" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid #444;">
            <button class="action-btn" onclick="playOracle()">Shake Oracle</button>
            <div id="oracle-res" style="margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <script>
        let balance = 50;
        function playOracle() {
            let res = document.getElementById('oracle-res');
            res.innerText = "Processing...";
            
            setTimeout(() => {
                // نسبة الفوز 60% للـ House (يعني اللاعب بيكسب 40% فقط)
                let playerWins = Math.random() < 0.40; 
                
                if (playerWins) {
                    balance += 10;
                    res.innerText = "YOU WIN!";
                    res.style.color = "#10b981";
                } else {
                    balance -= 10;
                    res.innerText = "ORACLE WINS!";
                    res.style.color = "#ff4444";
                }
                document.getElementById('balance-display').innerText = balance;
            }, 1000);
        }
    </script>
</body>
</html>
