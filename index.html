<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino</title>
    <style>
        :root {
            --bg-nav: rgba(15, 2, 2, 0.95);
            --primary: #8b0000;
            --primary-hover: #ff1a1a;
            --text-main: #fcebeb;
            --text-muted: #cca3a3;
            --green: #10b981;
            --gold: #d4af37;
        }

        body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; background: #050000; color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; }

        /* تعديل الشريط العلوي لمنع القطع */
        .top-navbar {
            background: var(--bg-nav);
            border-bottom: 2px solid var(--primary);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }

        /* كارد الـ Lottery الجديد */
        .lottery-card {
            background: linear-gradient(135deg, #2a2a20 0%, #1a1a0d 100%);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin: 20px auto;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lottery-info h3 { margin: 0; color: var(--gold); font-size: 1rem; }
        .lottery-info p { margin: 5px 0 0; font-size: 0.8rem; color: #ccc; }
        .buy-btn { background: var(--text-main); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .main-content { flex: 1; max-width: 480px; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .game-card {
            background: rgba(40, 8, 8, 0.5);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
            padding-bottom: 10px;
        }
        .card-img-area { height: 120px; display: flex; align-items: center; justify-content: center; background: #000; }
        .card-img-area img { max-width: 90%; max-height: 90%; }
        
        .game-footer-info { padding: 10px; }
        .game-title { margin: 5px 0 0 0; font-size: 1rem; font-weight: bold; text-transform: uppercase; }

        /* باقي الستايلات كما هي */
        .screen { display: none; }
        .screen.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0f0202; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); width: 80%; text-align: center; }
        .action-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="brand-logo" style="font-weight:900;">Crimson Casino</div>
        <div class="wallet-zone">
            <span id="balance-display" style="color:var(--green);">500</span> Xanax
            <button class="deposit-btn" style="margin-left:10px;" onclick="document.getElementById('deposit-modal').style.display='flex'">Deposit</button>
        </div>
    </div>

    <!-- كارد الـ Lottery الجديد -->
    <div class="lottery-card">
        <div class="lottery-info">
            <h3>Diamond Bladed Knife</h3>
            <p>16,000 tk • ~20 Xan / ticket</p>
        </div>
        <button class="buy-btn">BUY</button>
    </div>

    <div class="main-content">
        <div id="main-menu" class="screen active">
            <div class="games-grid">
                <div class="game-card" onclick="openGame('oracle')">
                    <div class="card-img-area"><img src="image.png" alt="Oracle"></div>
                    <div class="game-footer-info"><h4 class="game-title">Oracle</h4></div>
                </div>
                <div class="game-card" onclick="openGame('blackjack')">
                    <div class="card-img-area"><img src="blackjackpic.png" alt="Blackjack"></div>
                    <div class="game-footer-info"><h4 class="game-title">Blackjack</h4></div>
                </div>
            </div>
        </div>
        
        <!-- (هنا توضع باقي الـ Screens والـ Script الخاصة بك) -->
    </div>

    <script>
        function openGame(gameName) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('screen-' + gameName).style.display = 'block';
        }
        // ... (باقي الـ functions الخاصة بك كما هي)
    </script>
</body>
</html>
