<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Casino | Torn City</title>
    <style>
        /* إعدادات الخلفية الثابتة */
        body {
            background-image: url('1000151008.png'); /* لو غيرت اسم الصورة لـ bg.png عيرها هنا */
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* رصيد اللاعب فوق */
        .balance-card {
            background: rgba(255, 0, 51, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid #ff0033;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.3);
        }
        .balance-card span {
            color: #ff0033;
            text-shadow: 0 0 10px #ff0033;
        }

        /* الحاوية الزجاجية الرئيسية */
        .casino-container {
            background: rgba(10, 5, 5, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 0, 51, 0.3);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            color: #ff0033;
            text-shadow: 0 0 10px #ff0033;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* أزرار التنقل بين الألعاب (Tabs) */
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: #ff0033;
            border-bottom: 2px solid #ff0033;
            text-shadow: 0 0 8px #ff0033;
        }

        /* محتوى الألعاب */
        .game-content {
            display: none;
            min-height: 200px;
        }
        .game-content.active {
            display: block;
        }

        /* أزرار وحقول الإدخال المشتركة */
        input[type="number"] {
            width: 80%;
            background: #1a0d0e;
            border: 1px solid #ff0033;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .action-btn {
            width: 85%;
            background: #ff0033;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 0, 51, 0.3);
            margin: 5px 0;
        }
        .action-btn:hover {
            background: #cc0029;
            box-shadow: 0 4px 15px rgba(255, 0, 51, 0.6);
        }

        /* ستايل مخصص للـ Blackjack */
        .bj-zone {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        .cards { font-size: 1.2rem; color: #ff0033; font-weight: bold; margin-top: 5px;}

        /* ستايل اللوتري */
        .lottery-info {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- رصيد الـ Xanax العلوي -->
    <div class="balance-card">
        Your Balance: <span id="balance-display">50</span> Xanax
    </div>

    <div class="casino-container">
        <h1>Crimson Casino</h1>

        <!-- القائمة العلوية واختيار الألعاب -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('oracle')">Oracle</button>
            <button class="tab-btn" onclick="switchTab('blackjack')">Blackjack</button>
            <button class="tab-btn" onclick="switchTab('lottery')">Lottery</button>
        </div>

        <!-- 1. لعبة CRIMSON ORACLE -->
        <div id="oracle" class="game-content active">
            <p style="color: #bbb; font-size: 0.9rem;">Double your Xanax or burn it to ashes.</p>
            <input type="number" id="oracle-bet" placeholder="Bet Amount" min="1" value="5">
            <button class="action-btn" onclick="playOracle()">Shake The Oracle</button>
            <p id="oracle-result" style="font-weight: bold; margin-top: 15px;"></p>
        </div>

        <!-- 2. لعبة BLACKJACK -->
        <div id="blackjack" class="game-content">
            <div id="bj-setup">
                <input type="number" id="bj-bet" placeholder="Bet Amount" min="1" value="5">
                <button class="action-btn" onclick="startBlackjack()">Deal Cards</button>
            </div>
            <div id="bj-play" style="display: none;">
                <div class="bj-zone">Oracle's Hand: <div class="cards" id="dealer-cards">?</div></div>
                <div class="bj-zone">Your Hand: <div class="cards" id="player-cards">0</div></div>
                <button class="action-btn" style="width: 40%; margin: 5px;" onclick="bjHit()">Hit</button>
                <button class="action-btn" style="width: 40%; margin: 5px; background:#444;" onclick="bjStand()">Stand</button>
            </div>
            <p id="bj-result" style="font-weight: bold; margin-top: 15px;"></p>
        </div>

        <!-- 3. ركن الـ LOTTERY الأسبوعية -->
        <div id="lottery" class="game-content">
            <div class="lottery-info">
                <strong>Weekly Mega Lottery!</strong><br>
                Ticket Cost: 1 Xanax<br>
                Current Pool: <span style="color:#ff0033; font-weight:bold;">142 Xanax</span><br>
                Draw opens every Sunday.
            </div>
            <input type="number" id="ticket-count" placeholder="Number of tickets" min="1" value="1">
            <button class="action-btn" onclick="buyLottery()">Buy Tickets</button>
            <p id="lottery-result" style="font-weight: bold; color: #4caf50; margin-top: 15px;"></p>
        </div>

    </div>

    <script>
        // الرصيد الافتراضي للتجربة
        let balance = 50;
        let currentBjBet = 0;
        let playerHand = [];
        let dealerHand = [];

        function updateBalanceDisplay() {
            document.getElementById('balance-display').innerText = balance;
        }

        function switchTab(gameId) {
            document.querySelectorAll('.game-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(gameId).classList.add('active');
            event.target.classList.add('active');
            // تنظيف النتائج القديمة عند التنقل
            document.getElementById('oracle-result').innerText = "";
            document.getElementById('bj-result').innerText = "";
            document.getElementById('lottery-result').innerText = "";
        }

        // منطق لعبة الـ Crimson Oracle
        function playOracle() {
            let betInput = document.getElementById('oracle-bet');
            let bet = parseInt(betInput.value);
            let resultText = document.getElementById('oracle-result');

            if (isNaN(bet) || bet <= 0 || bet > balance) {
                resultText.style.color = "orange";
                resultText.innerText = "Invalid bet or insufficient Xanax!";
                return;
            }

            // نسبة المكسب والخسارة 50/50
            let win = Math.random() >= 0.5;
            if (win) {
                balance += bet;
                resultText.style.color = "#4caf50";
                resultText.innerText = `🔮 The Oracle smiles! You doubled your bet. (+${bet} Xanax)`;
            } else {
                balance -= bet;
                resultText.style.color = "#ff0033";
                resultText.innerText = `🔥 Burned to ashes! You lost ${bet} Xanax.`;
            }
            updateBalanceDisplay();
        }

        // منطق الـ Blackjack المبسط
        function getCardValue() { return Math.floor(Math.random() * 10) + 2; }
        function sumHand(hand) { return hand.reduce((a, b) => a + b, 0); }

        function startBlackjack() {
            let betInput = document.getElementById('bj-bet');
            currentBjBet = parseInt(betInput.value);
            let resultText = document.getElementById('bj-result');

            if (isNaN(currentBjBet) || currentBjBet <= 0 || currentBjBet > balance) {
                resultText.style.color = "orange";
                resultText.innerText = "Invalid bet!";
                return;
            }

            balance -= currentBjBet;
            updateBalanceDisplay();
            resultText.innerText = "";

            playerHand = [getCardValue(), getCardValue()];
            dealerHand = [getCardValue()];

            document.getElementById('bj-setup').style.display = "none";
            document.getElementById('bj-play').style.display = "block";
            
            document.getElementById('dealer-cards').innerText = dealerHand[0] + " + ?";
            document.getElementById('player-cards').innerText = sumHand(playerHand);
        }

        function bjHit() {
            playerHand.push(getCardValue());
            let score = sumHand(playerHand);
            document.getElementById('player-cards').innerText = score;

            if (score > 21) {
                endBj("You Busted! Oracle wins.", false);
            }
        }

        function bjStand() {
            while (sumHand(dealerHand) < 17) {
                dealerHand.push(getCardValue());
            }
            let playerScore = sumHand(playerHand);
            let dealerScore = sumHand(dealerHand);

            document.getElementById('dealer-cards').innerText = dealerScore;

            if (dealerScore > 21 || playerScore > dealerScore) {
                endBj(`You win! Oracle had ${dealerScore}.`, true);
            } else if (playerScore < dealerScore) {
                endBj(`Oracle wins with ${dealerScore}.`, false);
            } else {
                balance += currentBjBet; // تعادل يرجع الرهان
                endBj("Push! It's a tie.", null);
            }
        }

        function endBj(message, isWin) {
            let resultText = document.getElementById('bj-result');
            resultText.innerText = message;
            if (isWin === true) {
                balance += currentBjBet * 2;
                resultText.style.color = "#4caf50";
            } else if (isWin === false) {
                resultText.style.color = "#ff0033";
            } else {
                resultText.style.color = "white";
            }
            updateBalanceDisplay();
            document.getElementById('bj-setup').style.display = "block";
            document.getElementById('bj-play').style.display = "none";
        }

        // منطق شراء تذاكر اللوتري
        function buyLottery() {
            let countInput = document.getElementById('ticket-count');
            let count = parseInt(countInput.value);
            let resultText = document.getElementById('lottery-result');

            if (isNaN(count) || count <= 0 || count > balance) {
                resultText.style.color = "orange";
                resultText.innerText = "Check your balance!";
                return;
            }

            balance -= count;
            updateBalanceDisplay();
            resultText.innerText = `🎫 Successfully bought ${count} tickets! Good luck in Sunday's draw.`;
        }
    </script>
</body>
</html>
